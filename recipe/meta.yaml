{% set name = "matrix" %}
{% set version = "0.4.3" %}

package:
  name: rb-{{ name|lower }}
  version: {{ version }}

source:
  - url: https://rubygems.org/downloads/{{ name }}-{{ version }}.gem
    sha256: a0d5ab7ddcc1973ff690ab361b67f359acbb16958d1dc072b8b956a286564c5b

build:
  noarch: generic
  number: 0
  script:
    - gem install -N -l -V --norc --ignore-dependencies {{ name }}-{{ version }}.gem
    - gem unpack {{ name }}-{{ version }}.gem

requirements:
  host:
    - ruby
  run:
    - {{ pin_compatible('ruby', max_pin='x.x') }}

test:
  commands:
    - ruby -r {{ name }} -e 'exit 0'


about:
  home: https://rubygems.org/gems/matrix
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE
  summary: An implementation of Matrix and Vector classes.
  doc_url: http://www.rubydoc.info/gems/matrix
  dev_url: https://github.com/ruby/matrix

extra:
  recipe-maintainers:
    - jdmarques
